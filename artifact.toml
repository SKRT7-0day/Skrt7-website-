kind = "web"
previewPath = "/"
title = "SKRT7 Portfolio"
version = "1.0.0"
id = "artifacts/skrt7-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21409

[services.development]
run = "pnpm --filter @workspace/skrt7-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skrt7-portfolio", "run", "build" ]
publicDir = "artifacts/skrt7-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21409"
BASE_PATH = "/"
